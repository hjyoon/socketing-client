name: Bun Client Check

on:
  push:
    branches: [bun]
  pull_request:
    branches: [bun]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install --ignore-scripts
      - run: bun run test
      - run: bun run build
